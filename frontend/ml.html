<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ML Predictions</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>Solar Monitor</h1>
      <span>IoT System</span>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html">
        <span class="icon">⊞</span> Dashboard
      </a>
      <a href="ml.html" class="active">
        <span class="icon">⦿</span> ML Predictions
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Header -->
    <header class="top-header">
      <div class="header-left">
        <h2>ML Predictions</h2>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">

      <!-- 🔥 HERO SECTION -->
      <div class="ml-hero">

        <!-- Prediction Banner -->
        <div class="prediction-banner">
          <div class="risk-badge">
            <span class="dot"></span> Live Prediction
          </div>

          <h2>
            Efficiency<br>
            <span class="highlight" id="confidencePct">--%</span>
          </h2>

          <p>
            Real-time efficiency predicted using ML model based on sensor data.
          </p>

          <div class="prediction-actions">
            <button class="btn btn-outline">Refresh</button>
            <button class="btn btn-filled">View Logs</button>
          </div>
        </div>

        <!-- Confidence Card -->
        <div class="card confidence-card">
          <div class="donut-wrap">
            <canvas id="confidenceChart"></canvas>
            <div class="donut-center">
              <span class="pct" id="confidencePct">--%</span>
              <span class="pct-label">Efficiency</span>
            </div>
          </div>

          <h3>ML Model Output</h3>
          <p>Live prediction from trained model</p>
        </div>

      </div>

      <!-- 🔥 METRICS -->
      <div class="ml-metrics-row">

        <div class="ml-metric-card">
          <div class="metric-icon drift">🌡</div>
          <div>
            <div class="metric-label">Temperature</div>
            <h4 id="tempML">-- °C</h4>
          </div>
        </div>

        <div class="ml-metric-card">
          <div class="metric-icon model">⚡</div>
          <div>
            <div class="metric-label">Voltage</div>
            <h4 id="voltML">-- V</h4>
          </div>
        </div>

        <div class="ml-metric-card">
          <div class="metric-icon alert">🔌</div>
          <div>
            <div class="metric-label">Current</div>
            <h4 id="currML">-- A</h4>
          </div>
        </div>

      </div>

    </main>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
